<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ======= SEO Meta Tags ======= -->
  <title>Your Business Name | Automotive Spare Parts</title>
  <meta name="description" content="Contact us for premium automotive spare parts. Reach us via Facebook or WhatsApp instantly." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#1E3A5F" />

  <!-- ======= Open Graph ======= -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Your Business Name | Automotive Spare Parts" />
  <meta property="og:description" content="Contact us via Facebook or WhatsApp for premium automotive spare parts." />
  <meta property="og:image" content="assets/og-image.png" />

  <!-- ======= Favicon Placeholder ======= -->
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />

  <!-- ======= Google Fonts: Poppins ======= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ======= Font Awesome CDN ======= -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- ======= Main Stylesheet ======= -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ======= Decorative Background SVG (Automotive Blueprint Lines) ======= -->
  <div class="bg-decoration" aria-hidden="true">
    <svg class="bg-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <!-- Abstract gear / ring shapes -->
      <circle cx="700" cy="80"  r="120" fill="none" stroke="#1E3A5F" stroke-width="0.6" opacity="0.08"/>
      <circle cx="700" cy="80"  r="90"  fill="none" stroke="#1E3A5F" stroke-width="0.4" opacity="0.07"/>
      <circle cx="700" cy="80"  r="60"  fill="none" stroke="#1E3A5F" stroke-width="0.3" opacity="0.06"/>
      <circle cx="100" cy="520" r="150" fill="none" stroke="#1E3A5F" stroke-width="0.6" opacity="0.07"/>
      <circle cx="100" cy="520" r="110" fill="none" stroke="#1E3A5F" stroke-width="0.4" opacity="0.06"/>
      <circle cx="100" cy="520" r="70"  fill="none" stroke="#1E3A5F" stroke-width="0.3" opacity="0.05"/>
      <!-- Diagonal blueprint lines -->
      <line x1="0"   y1="200" x2="800" y2="400" stroke="#1E3A5F" stroke-width="0.4" opacity="0.05"/>
      <line x1="0"   y1="250" x2="800" y2="450" stroke="#1E3A5F" stroke-width="0.4" opacity="0.04"/>
      <line x1="0"   y1="300" x2="800" y2="500" stroke="#1E3A5F" stroke-width="0.3" opacity="0.03"/>
      <!-- Metallic corner accent lines -->
      <polyline points="0,0 80,0 80,80" fill="none" stroke="#BFC5CC" stroke-width="0.8" opacity="0.15"/>
      <polyline points="800,600 720,600 720,520" fill="none" stroke="#BFC5CC" stroke-width="0.8" opacity="0.15"/>
    </svg>
  </div>

  <!-- ======= Main Wrapper ======= -->
  <main class="page-wrapper" role="main">

    <!-- ======= Header Section ======= -->
    <header class="site-header animate-fade-up" role="banner">

      <!-- Logo -->
      <div class="logo-container">
        <!-- REPLACE src WITH YOUR ACTUAL LOGO -->
        <div class="logo-placeholder" aria-label="Business Logo">
          <i class="fa-solid fa-gear logo-icon" aria-hidden="true"></i>
        </div>
      </div>

      <!-- Business Name -->
      <h1 class="business-name">
          Your Business Name
      </h1>

      <!-- Sub-title -->
      <p class="business-subtitle">Automotive Spare Parts</p>

      <!-- Divider -->
      <div class="header-divider" aria-hidden="true"></div>

      <!-- Welcome Message -->
      <p class="welcome-text">Choose your preferred way to contact us.</p>

    </header>

    <!-- ======= Contact Cards Section ======= -->
    <section class="contact-section animate-fade-up delay-1" aria-label="Contact Options">

      <!-- ——— Facebook Card ——— -->
      <article class="contact-card card-facebook" aria-label="Contact via Facebook">
        <div class="card-icon-wrapper facebook-icon-bg" aria-hidden="true">
          <i class="fa-brands fa-facebook-f card-icon"></i>
        </div>
        <div class="card-content">
          <h2 class="card-title">Facebook</h2>
          <p class="card-description">Visit our Facebook page and stay connected.</p>
        </div>
        <a
          href="https://www.facebook.com/share/1FwNsXyy6L/?mibextid=wwXIfr"
          class="btn btn-facebook"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visit our Facebook Page"
          id="facebook-btn"
        >
          <i class="fa-brands fa-facebook-f btn-icon" aria-hidden="true"></i>
          Visit Facebook
        </a>
      </article>

      <!-- ——— WhatsApp Card ——— -->
      <article class="contact-card card-whatsapp" aria-label="Contact via WhatsApp">
        <div class="card-icon-wrapper whatsapp-icon-bg" aria-hidden="true">
          <i class="fa-brands fa-whatsapp card-icon"></i>
        </div>
        <div class="card-content">
          <h2 class="card-title">WhatsApp</h2>
          <p class="card-description">Start a conversation with us instantly.</p>
        </div>
        <a
          href="https://wa.me/218935573731"
          class="btn btn-whatsapp"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Chat with us on WhatsApp"
          id="whatsapp-btn"
        >
          <i class="fa-brands fa-whatsapp btn-icon" aria-hidden="true"></i>
          Chat on WhatsApp
        </a>
      </article>

    </section>

    <!-- ======= Footer Section ======= -->
    <footer class="site-footer animate-fade-up delay-2" role="contentinfo">
      <div class="footer-divider" aria-hidden="true"></div>
      <p class="footer-text">Thank you for visiting.</p>
    </footer>

  </main>

  <!-- ======= Main Script ======= -->
  <script src="script.js"></script>
</body>
</html>
